    .bg-pattern {

      content: ''; position: absolute; inset: 0;

    }
    main { position: relative; z-index: 1; padding-bottom: 80px; }

    .input {
      width: 100%;
      padding: 10px 12px;
      background: #fff;
      border: var(--border);
      border-radius: 10px;
      font-size: 16px;
      color: #0d2818;
      outline: none;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
    .input:focus { box-shadow: var(--shadow-sm); }
    .label {
      display: block;
      font-family: 'Anton', sans-serif;
      letter-spacing: 1.5px;
      font-size: 12px;
      color: #44403c;
      margin: 12px 0 6px;
    }
    .big-btn {
      width: 100%;
      padding: 14px;
      background: var(--pink);
      color: #fff;
      border: var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      font-family: 'Anton', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: transform 0.05s, box-shadow 0.05s;
    }
    .big-btn:active:not(:disabled) { transform: translate(2px, 2px); box-shadow: var(--shadow-sm); }
    .big-btn:disabled { background: #d4d4d4; box-shadow: none; cursor: not-allowed; }

    .card {
      background: var(--cream);
      border: var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
      color: #0d2818;
    }

    .top-bar {
      position: sticky; top: 0; z-index: 30;
      background: var(--green);
      border-bottom: var(--border);
      padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 0 rgba(0,0,0,0.3);
    }
    .bot-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
      background: var(--green);
      border-top: var(--border);
      padding: 6px 0 max(8px, env(safe-area-inset-bottom));
      display: flex;
    }
    .nav-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 4px 0;
      cursor: pointer;
      color: var(--cream);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      opacity: 0.6;
      font-family: inherit;
    }
    .nav-btn.active { opacity: 1; color: var(--yellow); }
    .nav-btn .ico { display: block; font-size: 22px; margin-bottom: 2px; }

    /* Modal */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .modal {
      background: var(--cream);
      color: #0d2818;
      border: var(--border);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 500px;
      max-height: 92vh;
      overflow-y: auto;
    }

    /* Tag for league name etc */
    .tag {
      display: inline-block;
      padding: 3px 8px;
      border: 2px solid #000;
      border-radius: 6px;
      font-family: 'Anton', sans-serif;
      font-size: 11px;
      letter-spacing: 1px;
    }

    @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

    /* Hide scrollbars but allow scroll */
    .scroll-x { overflow-x: auto; scrollbar-width: none; }

    function formatCountdown(ms) {
      if (ms <= 0) return null;
      const s = Math.floor(ms / 1000);
      const d = Math.floor(s / 86400);
      const h = Math.floor((s % 86400) / 3600);
      const m = Math.floor((s % 3600) / 60);
      if (d > 0) return `${d}j ${h}h`;
      if (h > 0) return `${h}h${m.toString().padStart(2, '0')}`;
      return `${m}min`;
    }

      return s;

    function scoreMatch(pred, result, mult = 1) {
      if (!pred || !result || result.h == null || result.a == null) return 0;
      if (pred.h == null || pred.a == null) return 0;
      const ph = +pred.h, pa = +pred.a, rh = +result.h, ra = +result.a;
      let pts = 0;
      if (ph === rh && pa === ra) pts = 3;
      else {
        const pSign = Math.sign(ph - pa);
        const rSign = Math.sign(rh - ra);
        if (pSign === rSign) {
          pts = (ph - pa) === (rh - ra) ? 2 : 1;
        }
      }
      return Math.round(pts * mult);

      if (errs.length) console.error('Load errors:', errs.map(e => e.error));

      // Index users by id
      const users = {};
      (usersR.data || []).forEach(u => { users[u.id] = u; });

      // Index leagues by id + attach members/admins
      const leagues = {};
      (leaguesR.data || []).forEach(l => { leagues[l.id] = { ...l, members: [], admins: [] }; });
      (membersR.data || []).forEach(m => {
        if (leagues[m.league_id]) {
          leagues[m.league_id].members.push(m.user_id);
          if (m.is_admin) leagues[m.league_id].admins.push(m.user_id);
        }
      });

      // Predictions grouped: { userId: { matches: {matchId: {h,a}}, special: {kind: value} } }
      const predictions = {};
      (predsR.data || []).forEach(p => {
        if (!predictions[p.user_id]) predictions[p.user_id] = { matches: {}, special: {} };
        predictions[p.user_id].matches[p.match_id] = { h: p.h, a: p.a };
      });
      (specR.data || []).forEach(p => {
        if (!predictions[p.user_id]) predictions[p.user_id] = { matches: {}, special: {} };
        predictions[p.user_id].special[p.kind] = p.value;
      });

      // Tournament: results map + ko team assignments + special
      const results = {};
      const ko = {};
      (resultsR.data || []).forEach(r => {
        if (r.h_score != null) results[r.match_id] = { h: r.h_score, a: r.a_score };
        if (r.h_team || r.a_team) ko[r.match_id] = { h: r.h_team, a: r.a_team };
      });
      const special = {};
      (tspR.data || []).forEach(t => { special[t.kind] = t.value; });

      return { users, leagues, predictions, tournament: { results, ko, special } };
    }

    async function loadComments(leagueId) {
      const { data, error } = await supa.from('comments')
        .select('*').eq('league_id', leagueId)
        .order('created_at', { ascending: true })
        .limit(300);
      if (error) { console.error(error); return []; }
      return (data || []).map(c => ({
        id: c.id, userId: c.user_id, text: c.text,
        matchId: c.match_id, time: new Date(c.created_at).getTime(),
      }));
    }

    // ============================================================
    // MAIN APP
    // ============================================================
    function App() {
      const [loading, setLoading] = useState(true);
      const [me, setMe] = useState(null);
      const [users, setUsers] = useState({});
      const [leagues, setLeagues] = useState({});
      const [predictions, setPredictions] = useState({});
      const [tournament, setTournament] = useState({ results: {}, ko: {}, special: {} });
      const [comments, setComments] = useState([]);
      const [view, setView] = useState('home');
      const [showHub, setShowHub] = useState(false);
      const [showAdmin, setShowAdmin] = useState(false);

      // Initial load
      useEffect(() => {
        (async () => {
          const meLocal = meStorage.get();
          const state = await loadAll();
          setUsers(state.users);
          setLeagues(state.leagues);
          setPredictions(state.predictions);
          setTournament(state.tournament);

          if (meLocal && state.users[meLocal.userId]) {
            const myLeagues = Object.values(state.leagues)
              .filter(l => l.members.includes(meLocal.userId))
              .map(l => l.id);
            let active = meLocal.activeLeagueId;
            if (!active || !state.leagues[active] || !myLeagues.includes(active)) {
              active = myLeagues[0] || null;
            }
            const newMe = { ...meLocal, activeLeagueId: active };
            meStorage.set(newMe);
            setMe(newMe);
            if (active) {
              const c = await loadComments(active);
              setComments(c);
            }
          }
          setLoading(false);
        })();
      }, []);

      // Realtime subscriptions
      useEffect(() => {
        if (!me) return;
        const ch = supa.channel('pool-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'users' }, async () => {
            const { data } = await supa.from('users').select('*');
            const m = {}; (data || []).forEach(u => m[u.id] = u);
            setUsers(m);
          })
          .on('postgres_changes', { event: '*', schema: 'public', table: 'leagues' }, async () => {
            const [lgR, memR] = await Promise.all([
              supa.from('leagues').select('*'),
              supa.from('league_members').select('*'),
            ]);
            const lgs = {};
            (lgR.data || []).forEach(l => lgs[l.id] = { ...l, members: [], admins: [] });
            (memR.data || []).forEach(m => {
              if (lgs[m.league_id]) {
                lgs[m.league_id].members.push(m.user_id);
                if (m.is_admin) lgs[m.league_id].admins.push(m.user_id);
              }
            });
            setLeagues(lgs);
          })
          .on('postgres_changes', { event: '*', schema: 'public', table: 'league_members' }, async () => {
            const [lgR, memR] = await Promise.all([
              supa.from('leagues').select('*'),
              supa.from('league_members').select('*'),
            ]);
            const lgs = {};
            (lgR.data || []).forEach(l => lgs[l.id] = { ...l, members: [], admins: [] });
            (memR.data || []).forEach(m => {
              if (lgs[m.league_id]) {
                lgs[m.league_id].members.push(m.user_id);
                if (m.is_admin) lgs[m.league_id].admins.push(m.user_id);
              }
            });
            setLeagues(lgs);
          })
          .on('postgres_changes', { event: '*', schema: 'public', table: 'predictions' }, async () => {
            const { data } = await supa.from('predictions').select('*');
            const p = {};
            (data || []).forEach(r => {
              if (!p[r.user_id]) p[r.user_id] = { matches: {}, special: {} };
              p[r.user_id].matches[r.match_id] = { h: r.h, a: r.a };
            });
            // merge special into existing predictions
            setPredictions(prev => {
              const next = { ...p };
              for (const uid_ of Object.keys(prev)) {
                if (!next[uid_]) next[uid_] = { matches: {}, special: {} };
                next[uid_].special = prev[uid_].special || {};
              }
              return next;
            });
          })
          .on('postgres_changes', { event: '*', schema: 'public', table: 'special_predictions' }, async () => {
            const { data } = await supa.from('special_predictions').select('*');
            setPredictions(prev => {
              const next = { ...prev };
              // Reset special, then rebuild
              for (const uid_ of Object.keys(next)) {
                next[uid_] = { ...next[uid_], special: {} };
              }
              (data || []).forEach(r => {
                if (!next[r.user_id]) next[r.user_id] = { matches: {}, special: {} };
                next[r.user_id].special[r.kind] = r.value;
              });
              return next;
            });
          })
          .on('postgres_changes', { event: '*', schema: 'public', table: 'tournament_results' }, async () => {
            const { data } = await supa.from('tournament_results').select('*');
            const results = {}, ko = {};
            (data || []).forEach(r => {
              if (r.h_score != null) results[r.match_id] = { h: r.h_score, a: r.a_score };
              if (r.h_team || r.a_team) ko[r.match_id] = { h: r.h_team, a: r.a_team };
            });
            setTournament(t => ({ ...t, results, ko }));
          })
          .on('postgres_changes', { event: '*', schema: 'public', table: 'tournament_special' }, async () => {
            const { data } = await supa.from('tournament_special').select('*');
            const sp = {}; (data || []).forEach(r => sp[r.kind] = r.value);
            setTournament(t => ({ ...t, special: sp }));
          })
          .on('postgres_changes', { event: '*', schema: 'public', table: 'comments', filter: me.activeLeagueId ? `league_id=eq.${me.activeLeagueId}` : undefined }, async () => {
            if (me.activeLeagueId) {
              const c = await loadComments(me.activeLeagueId);
              setComments(c);
            }
          })
          .subscribe();
        return () => { supa.removeChannel(ch); };
      }, [me?.userId, me?.activeLeagueId]);

      // Reload comments when switching league
      useEffect(() => {
        if (!me?.activeLeagueId) { setComments([]); return; }
        loadComments(me.activeLeagueId).then(setComments);
      }, [me?.activeLeagueId]);

      // Derived
      const activeLeague = me?.activeLeagueId ? leagues[me.activeLeagueId] : null;
      const isAdmin = !!(me && activeLeague && activeLeague.admins?.includes(me.userId));
      const leagueMembers = activeLeague
        ? (activeLeague.members || []).filter(id => users[id]).map(id => users[id])
        : [];

      const leaderboard = useMemo(() => {
        const adminSet = new Set(activeLeague?.admins || []);
        const rows = leagueMembers.map(u => {
          const preds = predictions[u.id] || { matches: {}, special: {} };
          let group = 0, ko = 0, special = 0, exact = 0;
          for (const m of GROUP_MATCHES) {
            const r = tournament.results?.[m.id];
            const pts = scoreMatch(preds.matches?.[m.id], r, 1);
            group += pts; if (pts === 3) exact++;
          }
          for (const k of KO_SHELLS) {
            const r = tournament.results?.[k.id];
            const p = preds.matches?.[k.id];
            const pts = scoreMatch(p, r, KO_MULT[k.stage] || 1);
            ko += pts;
            if (p && r && p.h == r.h && p.a == r.a) exact++;
          }
          const sp = preds.special || {};
          const tsp = tournament.special || {};
          if (tsp.winner && sp.winner === tsp.winner) special += SPECIAL_POINTS.winner;
          if (tsp.runnerUp && sp.runnerUp === tsp.runnerUp) special += SPECIAL_POINTS.runnerUp;
          if (tsp.topScorer && sp.topScorer && sp.topScorer.trim().toLowerCase() === tsp.topScorer.trim().toLowerCase()) special += SPECIAL_POINTS.topScorer;
          if (tsp.surprise && sp.surprise === tsp.surprise) special += SPECIAL_POINTS.surprise;
          return {
            userId: u.id, name: u.name, color: u.color,
            isAdmin: adminSet.has(u.id),
            group, ko, special, exact,
            total: group + ko + special,
          };
        });
        rows.sort((a, b) => b.total - a.total || b.exact - a.exact);
        return rows;
      }, [leagueMembers, predictions, tournament, activeLeague]);

      // === Actions ===
      const createProfile = async (name, color) => {
        const userId = uid();
        const { error } = await supa.from('users').insert({ id: userId, name, color });
        if (error) { alert('Erreur: ' + error.message); return; }
        const newMe = { userId, name, color, activeLeagueId: null };
        meStorage.set(newMe);
        setUsers(prev => ({ ...prev, [userId]: { id: userId, name, color } }));
        setMe(newMe);
      };

      const createLeague = async (name, emoji) => {
        // Generate unique code
        let code = genCode();
        for (let i = 0; i < 10; i++) {
          const { data } = await supa.from('leagues').select('code').eq('code', code);
          if (!data || data.length === 0) break;
          code = genCode();
        }
        const leagueId = lid();
        const { error: e1 } = await supa.from('leagues').insert({
          id: leagueId, name, emoji, code, created_by: me.userId, locked: false,
        });
        if (e1) { alert('Erreur création: ' + e1.message); return; }
        const { error: e2 } = await supa.from('league_members').insert({
          league_id: leagueId, user_id: me.userId, is_admin: true,
        });
        if (e2) { alert('Erreur membre: ' + e2.message); return; }

        // Update local state
        const newLeague = { id: leagueId, name, emoji, code, created_by: me.userId, locked: false, members: [me.userId], admins: [me.userId] };
        setLeagues(prev => ({ ...prev, [leagueId]: newLeague }));
        const newMe = { ...me, activeLeagueId: leagueId };
        meStorage.set(newMe);
        setMe(newMe);
        setShowHub(false);
      };

      const joinLeague = async (code) => {
        const { data, error } = await supa.from('leagues').select('*').eq('code', code.toUpperCase().trim()).single();
        if (error || !data) return { ok: false, msg: 'Code introuvable. Vérifie avec ton pote.' };

        // Check if already member
        const { data: existing } = await supa.from('league_members')
          .select('*').eq('league_id', data.id).eq('user_id', me.userId);
        if (existing && existing.length > 0) {
          const newMe = { ...me, activeLeagueId: data.id };
          meStorage.set(newMe);
          setMe(newMe);
          setShowHub(false);
          return { ok: true, msg: 'Déjà dedans — basculé sur cette ligue.' };
        }

        const { error: e2 } = await supa.from('league_members').insert({
          league_id: data.id, user_id: me.userId, is_admin: false,
        });
        if (e2) return { ok: false, msg: 'Erreur: ' + e2.message };

        // Update local
        setLeagues(prev => {
          const lg = prev[data.id] || { ...data, members: [], admins: [] };
          return {
            ...prev,
            [data.id]: { ...lg, members: [...(lg.members||[]), me.userId] },
          };
        });
        const newMe = { ...me, activeLeagueId: data.id };
        meStorage.set(newMe);
        setMe(newMe);
        setShowHub(false);
        return { ok: true, msg: 'Bienvenue dans ' + data.name + ' ! ' + data.emoji };
      };

      const switchLeague = (lgId) => {
        const newMe = { ...me, activeLeagueId: lgId };
        meStorage.set(newMe);
        setMe(newMe);
      };

      const setPrediction = async (matchId, h, a) => {
        // Optimistic update
        setPredictions(prev => ({
          ...prev,
          [me.userId]: {
            ...(prev[me.userId] || { matches: {}, special: {} }),
            matches: {
              ...(prev[me.userId]?.matches || {}),
              [matchId]: { h, a },
            }
          }
        }));
        const { error } = await supa.from('predictions').upsert({
          user_id: me.userId, match_id: matchId, h, a, updated_at: new Date().toISOString(),
        });
        if (error) console.error(error);
      };

      const setSpecial = async (kind, value) => {
        setPredictions(prev => ({
          ...prev,
          [me.userId]: {
            ...(prev[me.userId] || { matches: {}, special: {} }),
            special: {
              ...(prev[me.userId]?.special || {}),
              [kind]: value,
            }
          }
        }));
        const { error } = await supa.from('special_predictions').upsert({
          user_id: me.userId, kind, value, updated_at: new Date().toISOString(),
        });
        if (error) console.error(error);
      };

      const setResult = async (matchId, h, a) => {
        setTournament(t => ({
          ...t,
          results: { ...t.results, [matchId]: { h, a } },
        }));
        const { error } = await supa.from('tournament_results').upsert({
          match_id: matchId, h_score: h, a_score: a, updated_at: new Date().toISOString(),
        });
        if (error) console.error(error);
      };

      const setKoTeams = async (matchId, h, a) => {
        setTournament(t => ({
          ...t,
          ko: { ...t.ko, [matchId]: { h, a } },
        }));
        const { error } = await supa.from('tournament_results').upsert({
          match_id: matchId, h_team: h, a_team: a, updated_at: new Date().toISOString(),
        });
        if (error) console.error(error);
      };

      const setTournamentSpecial = async (kind, value) => {
        setTournament(t => ({ ...t, special: { ...t.special, [kind]: value } }));
        const { error } = await supa.from('tournament_special').upsert({
          kind, value, updated_at: new Date().toISOString(),
        });
        if (error) console.error(error);
      };

      const updateLeague = async (patch) => {
        const id = activeLeague.id;
        setLeagues(prev => ({ ...prev, [id]: { ...prev[id], ...patch } }));
        const { error } = await supa.from('leagues').update(patch).eq('id', id);
        if (error) console.error(error);
      };

      const addComment = async (text, matchId = null) => {
        const id = mid();
        const newC = { id, userId: me.userId, text, matchId, time: Date.now() };
        setComments(prev => [...prev, newC].slice(-300));
        const { error } = await supa.from('comments').insert({
          id, league_id: activeLeague.id, user_id: me.userId, text, match_id: matchId,
        });
        if (error) console.error(error);
      };

      const toggleAdmin = async (userId_) => {
        const isCurrent = activeLeague.admins.includes(userId_);
        if (isCurrent && activeLeague.admins.length === 1) {
          alert('Tu peux pas retirer le dernier admin 😬');
          return;
        }
        await supa.from('league_members').update({ is_admin: !isCurrent })
          .eq('league_id', activeLeague.id).eq('user_id', userId_);
        // Optimistic update
        setLeagues(prev => {
          const lg = { ...prev[activeLeague.id] };
          lg.admins = isCurrent
            ? lg.admins.filter(a => a !== userId_)
            : [...(lg.admins || []), userId_];
          return { ...prev, [activeLeague.id]: lg };
        });
      };

      const removeMember = async (userId_) => {
        if (userId_ === me.userId) return;
        if (!confirm('Virer ' + users[userId_].name + ' de cette ligue ?')) return;
        await supa.from('league_members').delete()
          .eq('league_id', activeLeague.id).eq('user_id', userId_);
        setLeagues(prev => {
          const lg = { ...prev[activeLeague.id] };
          lg.members = lg.members.filter(m => m !== userId_);
          lg.admins = (lg.admins || []).filter(a => a !== userId_);
          return { ...prev, [activeLeague.id]: lg };
        });
      };

      const deleteLeague = async () => {
        if (!confirm(`Supprimer "${activeLeague.name}" ? Action irréversible.`)) return;
        await supa.from('leagues').delete().eq('id', activeLeague.id);
        setLeagues(prev => {
          const next = { ...prev }; delete next[activeLeague.id]; return next;
        });
        const myLeagues = Object.values(leagues).filter(l => l.id !== activeLeague.id && l.members.includes(me.userId));
        const newMe = { ...me, activeLeagueId: myLeagues[0]?.id || null };
        meStorage.set(newMe);
        setMe(newMe);
        setShowAdmin(false);
      };

      const regenCode = async () => {
        if (!confirm('Régénérer un nouveau code ? L\'ancien deviendra invalide.')) return;
        let code = genCode();
        for (let i = 0; i < 10; i++) {
          const { data } = await supa.from('leagues').select('code').eq('code', code);
          if (!data || data.length === 0) break;
          code = genCode();
        }
        await updateLeague({ code });
      };

      const logout = () => {
        meStorage.clear();
        setMe(null);
        setView('home');
      };

      const myPreds = predictions[me?.userId] || { matches: {}, special: {} };

      if (loading) return html`<${LoadingScreen} />`;
      if (!me) return html`<${ProfileScreen} onCreate=${createProfile} />`;
      if (!activeLeague || showHub) {
        return html`<${LeagueHubScreen}
          me=${me} users=${users} leagues=${leagues}
          onCreate=${createLeague}
          onJoin=${joinLeague}
          onSelect=${(id) => { switchLeague(id); setShowHub(false); }}
          onClose=${activeLeague ? () => setShowHub(false) : null}
        />`;
      }

      return html`
        <div>
          <${TopBar}
            me=${me} users=${users} leagues=${leagues} activeLeague=${activeLeague}
            onSwitchLeague=${switchLeague}
            onOpenHub=${() => setShowHub(true)}
            onAdmin=${() => setShowAdmin(true)} isAdmin=${isAdmin}
            onLogout=${logout}
          />
          <main>
            ${view === 'home' && html`<${HomeView} me=${me} users=${users} activeLeague=${activeLeague} leaderboard=${leaderboard} predictions=${predictions} tournament=${tournament} comments=${comments} setView=${setView} />`}
            ${view === 'pronos' && html`<${PronosView} me=${me} myPreds=${myPreds} setPrediction=${setPrediction} tournament=${tournament} activeLeague=${activeLeague} />`}
            ${view === 'matchs' && html`<${MatchsView} tournament=${tournament} predictions=${predictions} users=${users} me=${me} leagueMembers=${leagueMembers} />`}
            ${view === 'classement' && html`<${LeaderboardView} leaderboard=${leaderboard} users=${users} me=${me} activeLeague=${activeLeague} />`}
            ${view === 'speciaux' && html`<${SpeciauxView} me=${me} myPreds=${myPreds} setSpecial=${setSpecial} tournament=${tournament} predictions=${predictions} users=${users} leagueMembers=${leagueMembers} />`}
            ${view === 'chat' && html`<${ChatView} me=${me} users=${users} comments=${comments} addComment=${addComment} activeLeague=${activeLeague} />`}
          </main>
          <${BottomNav} view=${view} setView=${setView} />
          ${showAdmin && isAdmin && html`<${AdminPanel}
            activeLeague=${activeLeague} updateLeague=${updateLeague}
            deleteLeague=${deleteLeague} regenCode=${regenCode}
            tournament=${tournament} setResult=${setResult} setKoTeams=${setKoTeams}
            setTournamentSpecial=${setTournamentSpecial}
            users=${users} toggleAdmin=${toggleAdmin} removeMember=${removeMember}
            me=${me} onClose=${() => setShowAdmin(false)}
          />`}
        </div>
      `;
    }

    // ============================================================
    // LOADING + ONBOARDING
    // ============================================================
    function LoadingScreen() {
      return html`
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center">
          <div style="text-align:center">
            <div style="font-size:80px" class="spin">⚽</div>
            <div class="anton" style="font-size:24px;color:var(--cream);margin-top:12px">CHARGEMENT</div>
          </div>
        </div>
      `;
    }

    function ProfileScreen({ onCreate }) {
      const [name, setName] = useState('');
      const [color, setColor] = useState(COLORS[Math.floor(Math.random() * COLORS.length)]);
      const [busy, setBusy] = useState(false);
      return html`
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
          <div style="width:100%;max-width:400px">
            <div style="text-align:center;margin-bottom:24px">
              <div style="font-size:64px;line-height:1">🏆</div>
              <div class="anton" style="font-size:54px;color:var(--cream);line-height:0.95;margin-top:8px;text-shadow:4px 4px 0 #000">
                POOL<br/>MONDIAL<br/>2026
              </div>
              <div style="color:var(--yellow);font-weight:700;margin-top:8px;letter-spacing:1px">
                48 ÉQUIPES • 104 MATCHS
              </div>
            </div>
            <div class="card" style="position:relative;box-shadow:var(--shadow-lg)">
              <div style="position:absolute;top:-14px;left:20px;background:var(--pink);color:#fff;padding:4px 12px;border:var(--border);border-radius:8px;transform:rotate(-3deg)" class="anton">
                TON PROFIL
              </div>
              <label class="label" style="margin-top:8px">TON BLAZE</label>
              <input class="input" type="text" value=${name}
                onInput=${e => setName(e.target.value.slice(0, 20))}
                placeholder="ex: Marco" autofocus />
              <label class="label">TA COULEUR</label>
              <div style="display:flex;flex-wrap:wrap;gap:8px">
                ${COLORS.map(c => html`
                  <button key=${c} onClick=${() => setColor(c)} style=${{
                    width: '36px', height: '36px', background: c,
                    border: color === c ? '3px solid #000' : '3px solid transparent',
                    borderRadius: '50%', cursor: 'pointer',
                    boxShadow: color === c ? '3px 3px 0 #000' : 'none',
                  }}></button>
                `)}
              </div>
              <button class="big-btn" disabled=${!name.trim() || busy}
                onClick=${async () => { setBusy(true); await onCreate(name.trim(), color); setBusy(false); }}
                style=${{ marginTop: '20px', background: name.trim() ? color : '#d4d4d4' }}>
                CONTINUER →
              </button>
              <div style="margin-top:12px;font-size:12px;color:#78716c;text-align:center">
                Ensuite tu créeras ou rejoindras une ligue
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function LeagueHubScreen({ me, users, leagues, onCreate, onJoin, onSelect, onClose }) {
      const myLeagues = Object.values(leagues).filter(l => l.members?.includes(me.userId));
      const [mode, setMode] = useState(myLeagues.length === 0 ? 'create' : 'list');
      const [newName, setNewName] = useState('');
      const [newEmoji, setNewEmoji] = useState('⚽');
      const [joinCode, setJoinCode] = useState('');
      const [feedback, setFeedback] = useState(null);
      const [busy, setBusy] = useState(false);

      const submitJoin = async () => {
        if (joinCode.length !== 6) return;
        setBusy(true);
        const res = await onJoin(joinCode);
        setBusy(false);
        setFeedback(res);
        if (res.ok) setJoinCode('');
      };

      const submitCreate = async () => {
        if (!newName.trim()) return;
        setBusy(true);
        await onCreate(newName.trim(), newEmoji);
        setBusy(false);
      };

      return html`
        <div style="padding:20px 16px 40px;min-height:100vh">
          <div style="max-width:480px;margin:0 auto">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
              <div>
                <div class="anton" style="font-size:34px;color:var(--cream);line-height:1;text-shadow:3px 3px 0 #000">TES LIGUES</div>
                <div style="color:var(--yellow);font-weight:700;font-size:13px;margin-top:4px">Salut ${me.name} 👋</div>
              </div>
              ${onClose && html`
                <button onClick=${onClose} style="background:var(--cream);border:var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;box-shadow:var(--shadow)">
                  ✕
                </button>
              `}
            </div>

            ${myLeagues.length > 0 && html`
              <div style="margin-bottom:20px;display:flex;flex-direction:column;gap:10px">
                ${myLeagues.map(lg => {
                  const memberCount = (lg.members || []).filter(uid_ => users[uid_]).length;
                  const isAdminHere = (lg.admins || []).includes(me.userId);
                  return html`
                    <button key=${lg.id} onClick=${() => onSelect(lg.id)} class="card" style="display:flex;align-items:center;gap:12px;cursor:pointer;text-align:left;width:100%">
                      <div style="font-size:36px">${lg.emoji}</div>
                      <div style="flex:1;min-width:0">
                        <div class="anton" style="font-size:18px;color:#0d2818">
                          ${lg.name}${isAdminHere ? html`<span style="margin-left:6px;font-size:12px;color:var(--pink)">👑</span>` : ''}
                        </div>
                        <div style="font-size:12px;color:#78716c">
                          ${memberCount} membre${memberCount > 1 ? 's' : ''} • Code <span class="mono" style="font-weight:700;color:var(--pink)">${lg.code}</span>
                        </div>
                      </div>
                      <div style="font-size:22px;color:#0d2818">›</div>
                    </button>
                  `;
                })}
              </div>
            `}

            <div style="display:flex;gap:0;margin-bottom:16px;background:#000;padding:4px;border-radius:12px;border:var(--border)">
              <button onClick=${() => { setMode('create'); setFeedback(null); }} style=${{
                flex: 1, background: mode === 'create' ? 'var(--pink)' : 'transparent',
                color: mode === 'create' ? '#fff' : 'var(--cream)',
                border: 'none', borderRadius: '8px', padding: '8px 0',
                fontFamily: 'Anton', fontSize: '13px', letterSpacing: '1px', cursor: 'pointer',
              }}>➕ CRÉER UNE LIGUE</button>
              <button onClick=${() => { setMode('join'); setFeedback(null); }} style=${{
                flex: 1, background: mode === 'join' ? 'var(--pink)' : 'transparent',
                color: mode === 'join' ? '#fff' : 'var(--cream)',
                border: 'none', borderRadius: '8px', padding: '8px 0',
                fontFamily: 'Anton', fontSize: '13px', letterSpacing: '1px', cursor: 'pointer',
              }}>🔑 REJOINDRE</button>
            </div>

            ${mode === 'create' && html`
              <div class="card" style="box-shadow:var(--shadow-lg)">
                <label class="label">NOM DE LA LIGUE</label>
                <input class="input" type="text" value=${newName}
                  onInput=${e => setNewName(e.target.value.slice(0, 30))}
                  placeholder="ex: Les Potes du Bar" />
                <label class="label">EMOJI</label>
                <div style="display:flex;flex-wrap:wrap;gap:6px">
                  ${LEAGUE_EMOJIS.map(e => html`
                    <button key=${e} onClick=${() => setNewEmoji(e)} style=${{
                      width: '40px', height: '40px', fontSize: '22px',
                      background: newEmoji === e ? 'var(--pink)' : '#fff',
                      border: 'var(--border)', borderRadius: '8px', cursor: 'pointer',
                      boxShadow: newEmoji === e ? 'var(--shadow-sm)' : 'none',
                    }}>${e}</button>
                  `)}
                </div>
                <button class="big-btn" disabled=${!newName.trim() || busy}
                  onClick=${submitCreate}
                  style=${{ marginTop: '20px', background: newName.trim() ? 'var(--pink)' : '#d4d4d4' }}>
                  CRÉER ${newEmoji}
                </button>
                <div style="margin-top:10px;font-size:12px;color:#78716c;text-align:center">

            ${mode === 'join' && html`
              <div class="card" style="box-shadow:var(--shadow-lg)">
                <label class="label">CODE DE LA LIGUE</label>
                <input class="input mono" type="text" value=${joinCode}
                  onInput=${e => setJoinCode(e.target.value.toUpperCase().slice(0, 6))}
                  placeholder="X7K2QP" maxLength="6"
                  style="font-size:24px;font-weight:700;letter-spacing:6px;text-align:center" />
                <button class="big-btn" disabled=${joinCode.length !== 6 || busy}

                  style=${{ marginTop: '12px', background: joinCode.length === 6 ? 'var(--emerald)' : '#d4d4d4' }}>

                ${feedback && html`

                `}
                <div style="margin-top:12px;font-size:12px;color:#78716c;text-align:center">
                  Demande le code à l'admin de la ligue (6 caractères)
                </div>
              </div>
            `}
          </div>
        </div>
      `;
    }

    // ============================================================
    // VIEWS
    // ============================================================
    function HomeView({ me, users, activeLeague, leaderboard, predictions, tournament, comments, setView }) {
      const myRow = leaderboard.find(r => r.userId === me.userId);
      const myRank = leaderboard.findIndex(r => r.userId === me.userId) + 1;
      const myPreds = predictions[me.userId] || { matches: {}, special: {} };
      const groupCount = Object.values(myPreds.matches || {}).filter(p => p.h != null).length;
      const specialCount = Object.values(myPreds.special || {}).filter(v => v).length;
      const upcoming = [...GROUP_MATCHES, ...KO_SHELLS]
        .filter(m => { const r = tournament.results?.[m.id]; return (!r || r.h == null) && KICKOFFS[m.id]; })
        .sort((a, b) => new Date(KICKOFFS[a.id]).getTime() - new Date(KICKOFFS[b.id]).getTime())
        .slice(0, 3);
      const lastC = comments[comments.length - 1];
      const lastUser = lastC && users[lastC.userId];

      return html`
        <div style="padding:14px 14px 80px">
          <!-- Rank hero -->
          <div style="background:#0d2818;border:var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden">
            <div style="position:absolute;top:-20px;right:-20px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(251,191,36,0.3),transparent 70%)"></div>
            <div style="display:flex;justify-content:space-between;align-items:flex-start;position:relative">
              <div style="flex:1;min-width:0">
                <div class="anton" style="color:var(--yellow);font-size:13px">SALUT ${me.name.toUpperCase()}</div>
                <div style="color:var(--lime);font-size:11px;font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                  ${activeLeague?.emoji} ${activeLeague?.name?.toUpperCase()}
                </div>
                <div class="anton" style="color:var(--cream);font-size:46px;line-height:1;margin-top:8px">#${myRank || '–'}</div>
                <div style="color:var(--lime);font-weight:700;margin-top:4px">${myRow?.total || 0} pts</div>
              </div>
              <div style=${{
                background: me.color, border: '3px solid #000', borderRadius: '50%',
                width: '60px', height: '60px', display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: 'Anton', fontSize: '28px', color: '#fff', flexShrink: 0,
              }}>${me.name[0]?.toUpperCase()}</div>
            </div>
          </div>

          <!-- Stats grid -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
            <button onClick=${() => setView('pronos')} class="card" style="cursor:pointer;text-align:left">
              <div style="font-size:24px">⚽</div>
              <div class="anton" style="font-size:24px">${groupCount}/${GROUP_MATCHES.length + KO_SHELLS.length}</div>
              <div style="font-size:11px;color:#78716c;font-weight:700">PRONOS FAITS</div>
            </button>
            <button onClick=${() => setView('speciaux')} class="card" style="cursor:pointer;text-align:left">
              <div style="font-size:24px">⭐</div>
              <div class="anton" style="font-size:24px">${specialCount}/4</div>
              <div style="font-size:11px;color:#78716c;font-weight:700">SPÉCIAUX</div>
            </button>
          </div>

          <!-- Upcoming -->
          <div style="margin-top:18px">
            <div class="anton" style="font-size:18px;color:var(--cream);margin-bottom:8px">⏱ PROCHAINS MATCHS</div>
            ${upcoming.length === 0 ? html`<div class="card" style="text-align:center;font-style:italic">Tous les matchs sont joués</div>` :
              upcoming.map(m => html`<${UpcomingMatchCard} key=${m.id} match=${m} tournament=${tournament} />`)
            }
          </div>

          <!-- Top 3 -->
          <div style="margin-top:18px">
            <div class="anton" style="font-size:18px;color:var(--cream);margin-bottom:8px">🏆 TOP 3</div>
            <div class="card" style="padding:0">
              ${leaderboard.slice(0, 3).map((r, i) => html`
                <div key=${r.userId} style=${{
                  display: 'flex', alignItems: 'center', gap: '10px',
                  padding: '10px 14px',
                  borderBottom: i < 2 ? '1px solid #d6d3d1' : 'none',
                  background: r.userId === me.userId ? '#fff7ed' : 'transparent',
                }}>
                  <div style=${{
                    width: '28px', height: '28px', borderRadius: '50%',
                    background: i === 0 ? '#fbbf24' : i === 1 ? '#a3a3a3' : '#d97706',

          `}
        </div>
      `;
    }

    function UpcomingMatchCard({ match, tournament }) {
      const ko = tournament.ko?.[match.id];
      const homeId = match.h || ko?.h;
      const awayId = match.a || ko?.a;
      const hT = homeId ? TEAMS[homeId] : null;
      const aT = awayId ? TEAMS[awayId] : null;
      const kickoffIso = KICKOFFS[match.id];
      return html`
        <div class="card" style="margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="tag" style=${{ background: match.g ? 'var(--emerald)' : 'var(--pink)', color: '#fff' }}>
              ${match.g ? 'GR. ' + match.g : match.label?.toUpperCase()}
            </div>
            <div style="flex:1;display:flex;align-items:center;gap:8px;font-weight:700;min-width:0">
              <span style="font-size:18px">${hT?.flag || '?'}</span>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${hT?.name || '???'}</span>
              <span style="color:#78716c">vs</span>
              <span style="flex:1;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${aT?.name || '???'}</span>
              <span style="font-size:18px">${aT?.flag || '?'}</span>
            </div>
          </div>
          ${kickoffIso && html`
            <div style="margin-top:4px;font-size:11px;color:#78716c;text-align:center">
              ⏱ ${formatKickoff(kickoffIso)}
            </div>
          `}
        </div>
      `;
    }

    // ============================================================
    // PRONOS VIEW
    // ============================================================

      const [koStage, setKoStage] = useState('r32');
      const [now, setNow] = useState(Date.now());
      const leagueLocked = !!activeLeague?.locked;

      useEffect(() => {
        const t = setInterval(() => setNow(Date.now()), 30000);
        return () => clearInterval(t);
      }, []);

      const groupMatches = GROUP_MATCHES.filter(m => m.g === groupSel);
      const koMatches = KO_SHELLS.filter(m => m.stage === koStage);

      return html`
        <div style="padding:14px 14px 80px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
            <span style="font-size:30px">⚽</span>
            <div class="anton" style="font-size:30px;color:var(--cream);text-shadow:3px 3px 0 #000">PRONOS</div>
            ${leagueLocked && html`<div class="tag" style="background:var(--red);color:#fff;margin-left:auto">🔒 LIGUE</div>`}
          </div>

          <div style="display:flex;gap:0;margin-bottom:12px;background:#000;padding:4px;border-radius:10px;border:var(--border)">

            <button onClick=${() => setTab('ko')} style=${{ flex: 1, background: tab === 'ko' ? 'var(--pink)' : 'transparent', color: tab === 'ko' ? '#fff' : 'var(--cream)', border: 'none', borderRadius: '6px', padding: '8px 0', fontFamily: 'Anton', fontSize: '13px', cursor: 'pointer' }}>ÉLIM.</button>
          </div>

          ${tab === 'groups' && html`
            <div class="scroll-x" style="display:flex;gap:6px;margin-bottom:12px;padding-bottom:4px">
              ${Object.keys(GROUPS).map(g => html`
                <button key=${g} onClick=${() => setGroupSel(g)} style=${{
                  flexShrink: 0, background: groupSel === g ? '#0d2818' : 'var(--cream)',
                  color: groupSel === g ? 'var(--cream)' : '#0d2818',
                  border: 'var(--border)', borderRadius: '8px',
                  padding: '6px 12px', fontFamily: 'Anton', fontSize: '14px', cursor: 'pointer',
                }}>GR. ${g}</button>
              `)}
            </div>
            ${groupMatches.map(m => html`<${PredictionCard} key=${m.id} match=${m} pred=${myPreds.matches?.[m.id]} result=${tournament.results?.[m.id]} leagueLocked=${leagueLocked} now=${now} onSet=${(h, a) => setPrediction(m.id, h, a)} />`)}
          `}

          ${tab === 'ko' && html`
            <div class="scroll-x" style="display:flex;gap:6px;margin-bottom:12px;padding-bottom:4px">
              ${[['r32','Seizièmes'],['r16','Huit.'],['qf','Quarts'],['sf','Demis'],['tp','3e pl.'],['final','Finale']].map(([k, l]) => html`
                <button key=${k} onClick=${() => setKoStage(k)} style=${{
                  flexShrink: 0, background: koStage === k ? '#0d2818' : 'var(--cream)',
                  color: koStage === k ? 'var(--cream)' : '#0d2818',
                  border: 'var(--border)', borderRadius: '8px',
                  padding: '6px 12px', fontFamily: 'Anton', fontSize: '13px', cursor: 'pointer',
                }}>${l}</button>
              `)}
            </div>
            <div class="card" style="background:#0d2818;color:var(--cream);margin-bottom:10px">
              <div class="anton" style="color:var(--yellow);font-size:14px">MULTIPLICATEUR ×${KO_MULT[koStage]}</div>
              <div style="color:var(--lime);font-size:12px;margin-top:2px">Les points sont multipliés à ce tour 🔥</div>
            </div>
            ${koMatches.map(m => html`<${PredictionCard} key=${m.id} match=${m} pred=${myPreds.matches?.[m.id]} result=${tournament.results?.[m.id]} koAssign=${tournament.ko?.[m.id]} leagueLocked=${leagueLocked} now=${now} isKo onSet=${(h, a) => setPrediction(m.id, h, a)} mult=${KO_MULT[m.stage]} />`)}
          `}
        </div>
      `;
    }

    function PredictionCard({ match, pred, result, koAssign, leagueLocked, now, isKo, onSet, mult }) {
      const homeId = match.h || koAssign?.h;
      const awayId = match.a || koAssign?.a;
      const hT = homeId ? TEAMS[homeId] : null;
      const aT = awayId ? TEAMS[awayId] : null;
      const played = result && result.h != null;
      const pts = played && pred ? scoreMatch(pred, result, mult || 1) : null;

      // Lock logic: kickoff time passed OR result entered OR league locked
      const kickoffIso = KICKOFFS[match.id];
      const kickoffMs = kickoffIso ? new Date(kickoffIso).getTime() : null;
      const timeLocked = kickoffMs != null && now >= kickoffMs;
      const cardLocked = leagueLocked || played || timeLocked;

      // Countdown display when < 48h to kickoff and not yet locked
      const msToKickoff = kickoffMs != null ? kickoffMs - now : null;
      const showCountdown = msToKickoff != null && msToKickoff > 0 && msToKickoff < 48 * 3600 * 1000;
      const countdown = showCountdown ? formatCountdown(msToKickoff) : null;
      const isImminent = showCountdown && msToKickoff < 2 * 3600 * 1000;

      // Lock reason label
      let lockBadge = null;
      if (played) lockBadge = null; // result speaks for itself
      else if (leagueLocked) lockBadge = { txt: '🔒 LIGUE', bg: 'var(--red)' };
      else if (timeLocked) lockBadge = { txt: '🔒 MATCH ENGAGÉ', bg: 'var(--red)' };
      else if (isImminent) lockBadge = { txt: `⏱ ${countdown}`, bg: '#f59e0b' };
      else if (showCountdown) lockBadge = { txt: `⏱ ${countdown}`, bg: '#a3a3a3' };

      return html`
        <div class="card" style=${{
          background: played ? '#fef3c7' : '#fff', marginBottom: '8px',
          opacity: cardLocked && !played ? 0.75 : 1,
        }}>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:6px">
            ${isKo ? html`<div class="tag" style="background:var(--pink);color:#fff">${match.label?.toUpperCase()} ${mult ? '×' + mult : ''}</div>` : html`<div class="tag" style="background:var(--emerald);color:#fff">GR. ${match.g}</div>`}
            <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
              ${lockBadge && html`<div class="tag" style=${{ background: lockBadge.bg, color: '#fff' }}>${lockBadge.txt}</div>`}
              ${played && pts !== null && html`<div class="anton" style=${{ color: pts > 0 ? 'var(--emerald)' : '#ef4444', fontSize: '14px' }}>${pts > 0 ? '+' + pts : pts} pt</div>`}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="flex:1;display:flex;align-items:center;gap:6px;min-width:0">
              <span style="font-size:22px">${hT?.flag || '⚪'}</span>
              <span style="font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${hT?.name || '???'}</span>
            </div>
            <${ScoreInput} value=${pred?.h} onChange=${v => onSet(v, pred?.a)} disabled=${cardLocked} />
            <span style="font-weight:700">–</span>
            <${ScoreInput} value=${pred?.a} onChange=${v => onSet(pred?.h, v)} disabled=${cardLocked} />
            <div style="flex:1;display:flex;align-items:center;gap:6px;justify-content:flex-end;min-width:0">
              <span style="font-weight:700;font-size:13px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${aT?.name || '???'}</span>
              <span style="font-size:22px">${aT?.flag || '⚪'}</span>
            </div>
          </div>
          ${kickoffIso && !played && html`
            <div style="margin-top:6px;font-size:11px;color:#78716c;text-align:center;font-family:'DM Sans'">
              Coup d'envoi : <span style="font-weight:700;color:#0d2818">${formatKickoff(kickoffIso)}</span>
            </div>
          `}
          ${played && html`
            <div style="margin-top:8px;padding:6px 10px;background:#fff;border:2px solid #000;border-radius:8px;text-align:center;font-size:12px">
              <span style="font-weight:700">Résultat :</span> <span class="mono" style="font-weight:700">${result.h} – ${result.a}</span>
            </div>
          `}
        </div>
      `;
    }

    function ScoreInput({ value, onChange, disabled }) {
      return html`
        <input type="number" min="0" max="20" value=${value ?? ''}
          disabled=${disabled}
          onInput=${e => {
            const v = e.target.value === '' ? null : Math.max(0, Math.min(20, parseInt(e.target.value, 10) || 0));
            onChange(v);
          }}
          style=${{
            width: '42px', padding: '6px',
            background: disabled ? '#f5f5f4' : '#fff',
            border: '2px solid #000', borderRadius: '6px',
            fontSize: '16px', fontWeight: 700, textAlign: 'center',
            fontFamily: 'JetBrains Mono', color: '#0d2818',
            outline: 'none',
          }} />
      `;
    }

    function MatchPublicCard({ match, tournament, predictions, users, memberIds, myUserId }) {
      const ko = tournament.ko?.[match.id];
      const homeId = match.h || ko?.h;
      const awayId = match.a || ko?.a;

      const aT = awayId ? TEAMS[awayId] : null;

      const played = result && result.h != null;
      const mult = match.stage ? KO_MULT[match.stage] : 1;
      const preds = Object.entries(predictions)
        .filter(([id]) => memberIds.has(id))
        .map(([id, p]) => ({ id, user: users[id], pred: p.matches?.[match.id] }))
        .filter(x => x.user && x.pred && x.pred.h != null);

      return html`
        <div class="card" style=${{ background: played ? '#fef3c7' : '#fff', marginBottom: '8px' }}>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div class="tag" style=${{ background: match.g ? 'var(--emerald)' : 'var(--pink)', color: '#fff' }}>
              ${match.g ? 'GR. ' + match.g : match.label?.toUpperCase()}
            </div>
            ${played ? html`<div class="anton mono" style="font-size:18px">${result.h} – ${result.a}</div>` : html`<div style="font-size:11px;color:#78716c;font-weight:700">À VENIR</div>`}
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="flex:1;display:flex;align-items:center;gap:6px;min-width:0">
              <span style="font-size:20px">${hT?.flag || '⚪'}</span>
              <span style="font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis">${hT?.name || '???'}</span>
            </div>
            <div style="color:#78716c">vs</div>
            <div style="flex:1;display:flex;align-items:center;gap:6px;justify-content:flex-end;min-width:0">
              <span style="font-weight:700;font-size:13px;text-align:right;overflow:hidden;text-overflow:ellipsis">${aT?.name || '???'}</span>
              <span style="font-size:20px">${aT?.flag || '⚪'}</span>
            </div>
          </div>
          ${preds.length > 0 && html`
            <div style="padding-top:8px;border-top:1px dashed #000">
              <div style="font-size:10px;font-weight:700;color:#78716c;margin-bottom:4px">${preds.length} PRONO${preds.length > 1 ? 'S' : ''} :</div>
              <div style="display:flex;flex-wrap:wrap;gap:4px">
                ${preds.map(p => {
                  const pts = played ? scoreMatch(p.pred, result, mult) : null;
                  return html`
                    <div key=${p.id} style=${{
                      display: 'flex', alignItems: 'center', gap: '4px',
                      background: p.id === myUserId ? '#fff7ed' : '#fff',
                      border: '2px solid #000', borderRadius: '6px',
                      padding: '2px 6px', fontSize: '11px', fontWeight: 700,

                      <span style=${{ background: p.user.color, width: '12px', height: '12px', borderRadius: '50%' }}></span>
                      <span>${p.user.name}</span>
                      <span class="mono" style="color:#78716c">${p.pred.h}–${p.pred.a}</span>
                      ${pts !== null && html`<span class="anton" style=${{ color: pts > 0 ? 'var(--emerald)' : '#ef4444', fontSize: '10px' }}>${pts > 0 ? '+' + pts : pts}</span>`}
                    </div>
                  `;
                })}
              </div>
            </div>
          `}
        </div>
      `;
    }

              <strong>Réel :</strong> ${type === 'team' && TEAMS[tsp[kind]] ? `${TEAMS[tsp[kind]].flag} ${TEAMS[tsp[kind]].name}` : tsp[kind]}
              ${sp[kind] && sp[kind] === tsp[kind] ? html`<span style="margin-left:8px;color:var(--emerald);font-weight:700">+${points}pt ✓</span>` : ''}

    // ============================================================
    // CHAT
    // ============================================================
    function ChatView({ me, users, comments, addComment, activeLeague }) {
      const [text, setText] = useState('');
      const scrollRef = useRef(null);
      useEffect(() => {
        if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }, [comments.length]);
      const send = () => {
        if (!text.trim()) return;
        addComment(text.trim());
        setText('');
      };
      return html`
        <div style="padding:14px 14px 80px;display:flex;flex-direction:column;height:calc(100vh - 80px)">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
            <span style="font-size:30px">💬</span>
            <div>
              <div class="anton" style="font-size:28px;color:var(--cream);line-height:1;text-shadow:3px 3px 0 #000">LA CHAMBRE</div>
              <div style="color:var(--lime);font-size:11px;font-weight:700;margin-top:2px">${activeLeague?.emoji} ${activeLeague?.name?.toUpperCase()}</div>
            </div>
          </div>
          <div ref=${scrollRef} style="flex:1;overflow-y:auto;background:rgba(255,255,255,0.06);border:var(--border);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:8px;margin-bottom:10px">
            ${comments.length === 0 ? html`<div style="text-align:center;color:#a3a3a3;font-style:italic;margin:auto">Personne n'a encore lâché un mot. Lance la chambre 🔥</div>` :
              comments.map(c => {
                const u = users[c.userId];
                if (!u) return null;
                const mine = c.userId === me.userId;
                return html`
                  <div key=${c.id} style=${{ display: 'flex', flexDirection: 'column', alignItems: mine ? 'flex-end' : 'flex-start' }}>
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
                      <span style="font-size:11px;font-weight:700;color:var(--cream)">${u.name}</span>
                      <span style="font-size:10px;color:#a3a3a3">${new Date(c.time).toLocaleTimeString('fr', { hour: '2-digit', minute: '2-digit' })}</span>
                    </div>
                    <div style=${{
                      background: mine ? u.color : '#fef3c7',
                      color: mine ? '#fff' : '#0d2818',
                      padding: '8px 12px', borderRadius: '12px',
                      border: '2px solid #000', maxWidth: '78%',
                      fontSize: '14px', wordBreak: 'break-word',
                    }}>${c.text}</div>
                  </div>
                `;
              })
            }
          </div>
          <div style="display:flex;gap:8px">
            <input class="input" type="text" value=${text} onInput=${e => setText(e.target.value)} onKeyDown=${e => e.key === 'Enter' && send()} placeholder="Chambre tes potes..." style="margin:0;flex:1" />
            <button onClick=${send} disabled=${!text.trim()} style=${{
              background: text.trim() ? 'var(--pink)' : '#a8a29e', color: '#fff',
              border: 'var(--border)', borderRadius: '10px', padding: '0 18px',
              cursor: text.trim() ? 'pointer' : 'not-allowed',
              boxShadow: text.trim() ? 'var(--shadow-sm)' : 'none',
              fontFamily: 'Anton', fontSize: '14px',
            }}>ENVOI</button>
          </div>
        </div>
      `;
    }

            <div style="padding:14px">
              <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
                ${[['league','🏷 Ligue'],['results','Scores'],['special','Spéciaux'],['ko','Tableau'],['users','Membres']].map(([k, l]) => html`
                  <button key=${k} onClick=${() => setSection(k)} style=${{
                    background: section === k ? 'var(--pink)' : '#fff',
                    color: section === k ? '#fff' : '#0d2818',
                    border: '2px solid #000', borderRadius: '8px',
                    padding: '4px 10px', fontFamily: 'Anton', fontSize: '12px', cursor: 'pointer',
                  }}>${l}</button>
                `)}
              </div>
              ${section === 'league' && html`<${AdminLeague} activeLeague=${activeLeague} updateLeague=${updateLeague} deleteLeague=${deleteLeague} regenCode=${regenCode} me=${me} />`}
              ${section === 'results' && html`<${AdminResults} tournament=${tournament} setResult=${setResult} />`}
              ${section === 'special' && html`<${AdminSpecial} tournament=${tournament} setTournamentSpecial=${setTournamentSpecial} />`}
              ${section === 'ko' && html`<${AdminKo} tournament=${tournament} setKoTeams=${setKoTeams} setResult=${setResult} />`}
              ${section === 'users' && html`<${AdminUsers} activeLeague=${activeLeague} users=${users} toggleAdmin=${toggleAdmin} removeMember=${removeMember} me=${me} />`}
            </div>
          </div>
        </div>
      `;
    }

    function AdminLeague({ activeLeague, updateLeague, deleteLeague, regenCode, me }) {
      const [name, setName] = useState(activeLeague.name);
      const [emoji, setEmoji] = useState(activeLeague.emoji);
      const [copied, setCopied] = useState(false);
      const isCreator = activeLeague.created_by === me.userId;
      const memberCount = (activeLeague.members || []).length;

      const copyCode = () => {
        try { navigator.clipboard?.writeText(activeLeague.code); setCopied(true); setTimeout(() => setCopied(false), 1500); } catch (e) {}
      };

      return html`
        <div>
          <div style="background:#0d2818;border:var(--border);border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:var(--shadow);text-align:center">
            <div style="color:var(--lime);font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:4px">CODE D'INVITATION</div>
            <div class="mono" style="font-size:36px;font-weight:700;color:var(--yellow);letter-spacing:6px;text-shadow:2px 2px 0 #000">${activeLeague.code}</div>
            <div style="display:flex;gap:8px;margin-top:10px;justify-content:center">
              <button onClick=${copyCode} style=${{ background: copied ? 'var(--emerald)' : 'var(--pink)', color: '#fff', border: '2px solid #000', borderRadius: '8px', padding: '6px 14px', cursor: 'pointer', fontFamily: 'Anton', fontSize: '12px' }}>${copied ? '✓ COPIÉ' : '📋 COPIER'}</button>
              <button onClick=${regenCode} style="background:var(--cream);color:#0d2818;border:2px solid #000;border-radius:8px;padding:6px 14px;cursor:pointer;font-family:Anton;font-size:12px">♻ NOUVEAU</button>
            </div>
            <div style="color:var(--cream);font-size:11px;margin-top:8px">${memberCount} membre${memberCount > 1 ? 's' : ''}</div>
          </div>

          <label class="label">NOM DE LA LIGUE</label>
          <input class="input" type="text" value=${name} onInput=${e => setName(e.target.value.slice(0, 30))} />
          <label class="label">EMOJI</label>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${LEAGUE_EMOJIS.map(e => html`<button key=${e} onClick=${() => setEmoji(e)} style=${{ width: '36px', height: '36px', fontSize: '20px', background: emoji === e ? 'var(--pink)' : '#fff', border: '2px solid #000', borderRadius: '6px', cursor: 'pointer' }}>${e}</button>`)}
          </div>
          <button class="big-btn" style="margin-top:16px;background:var(--emerald)" onClick=${() => updateLeague({ name: name.trim(), emoji })}>💾 SAUVEGARDER</button>

          <div style="margin-top:18px;padding-top:14px;border-top:2px dashed #000">
            <button class="big-btn" onClick=${() => updateLeague({ locked: !activeLeague.locked })} style=${{ background: activeLeague.locked ? 'var(--emerald)' : 'var(--red)' }}>
              ${activeLeague.locked ? '🔓 DÉVERROUILLER LES PRONOS' : '🔒 VERROUILLER LES PRONOS'}
            </button>
            <div style="margin-top:6px;font-size:11px;color:#78716c;text-align:center">
              ${activeLeague.locked ? 'Pronos figés' : 'Pronos ouverts à la modification'}
            </div>
          </div>

          ${isCreator && html`
            <div style="margin-top:18px;padding-top:14px;border-top:2px dashed #000">
              <button class="big-btn" style="background:#7f1d1d;font-size:13px" onClick=${deleteLeague}>🗑 SUPPRIMER LA LIGUE</button>
              <div style="margin-top:6px;font-size:11px;color:#7f1d1d;text-align:center">Irréversible — chat et membres perdus</div>
            </div>
          `}
        </div>
      `;
    }

    function AdminResults({ tournament, setResult }) {
      const [groupSel, setGroupSel] = useState('A');
      const matches = GROUP_MATCHES.filter(m => m.g === groupSel);
      return html`
        <div>
          <div class="scroll-x" style="display:flex;gap:6px;margin-bottom:12px;padding-bottom:4px">
            ${Object.keys(GROUPS).map(g => html`
              <button key=${g} onClick=${() => setGroupSel(g)} style=${{ flexShrink: 0, background: groupSel === g ? '#0d2818' : '#fff', color: groupSel === g ? 'var(--cream)' : '#0d2818', border: '2px solid #000', borderRadius: '6px', padding: '6px 12px', fontFamily: 'Anton', fontSize: '12px', cursor: 'pointer' }}>GR. ${g}</button>
            `)}
          </div>
          ${matches.map(m => html`<${AdminResultRow} key=${m.id} match=${m} result=${tournament.results?.[m.id]} setResult=${setResult} />`)}
        </div>
      `;
    }

    function AdminResultRow({ match, result, setResult }) {
      const ko = match.h ? null : null; // group only here
      const hT = TEAMS[match.h];
      const aT = TEAMS[match.a];
      const r = result || {};
      return html`
        <div style="background:#fff;border:2px solid #000;border-radius:8px;padding:8px;margin-bottom:6px;display:flex;align-items:center;gap:6px">
          <div style="flex:1;font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
            ${hT.flag} ${hT.name}
          </div>
          <${ScoreInput} value=${r.h} onChange=${v => setResult(match.id, v, r.a ?? null)} />
          <span>–</span>
          <${ScoreInput} value=${r.a} onChange=${v => setResult(match.id, r.h ?? null, v)} />
          <div style="flex:1;font-size:12px;font-weight:700;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
            ${aT.name} ${aT.flag}
          </div>
        </div>
      `;
    }

    function AdminKo({ tournament, setKoTeams, setResult }) {
      const [stage, setStage] = useState('r32');
      const matches = KO_SHELLS.filter(m => m.stage === stage);
      const allTeams = Object.entries(TEAMS).sort((a, b) => a[1].name.localeCompare(b[1].name));
      return html`
        <div>
          <div style="font-size:12px;margin-bottom:10px;color:#44403c">Assigne les équipes et les scores. Le multiplicateur s'applique aux points.</div>
          <div class="scroll-x" style="display:flex;gap:6px;margin-bottom:12px;padding-bottom:4px">
            ${[['r32','Seizièmes'],['r16','Huit.'],['qf','Quarts'],['sf','Demis'],['tp','3e pl.'],['final','Finale']].map(([k, l]) => html`
              <button key=${k} onClick=${() => setStage(k)} style=${{ flexShrink: 0, background: stage === k ? '#0d2818' : '#fff', color: stage === k ? 'var(--cream)' : '#0d2818', border: '2px solid #000', borderRadius: '6px', padding: '6px 12px', fontFamily: 'Anton', fontSize: '12px', cursor: 'pointer' }}>${l}</button>
            `)}
          </div>
          ${matches.map(m => {
            const ko = tournament.ko?.[m.id] || {};
            const r = tournament.results?.[m.id] || {};
            return html`
              <div key=${m.id} style="background:#fff;border:2px solid #000;border-radius:8px;padding:8px;margin-bottom:8px">
                <div style="font-size:11px;font-weight:700;color:#78716c;margin-bottom:6px">${m.label?.toUpperCase()} #${m.id.split('_')[1]}</div>
                <div style="display:flex;gap:6px;margin-bottom:6px">
                  <select class="input" style="margin:0;flex:1" value=${ko.h || ''} onChange=${e => setKoTeams(m.id, e.target.value || null, ko.a)}>
                    <option value="">— Équipe A —</option>
                    ${allTeams.map(([c, t]) => html`<option key=${c} value=${c}>${t.flag} ${t.name}</option>`)}
                  </select>
                  <select class="input" style="margin:0;flex:1" value=${ko.a || ''} onChange=${e => setKoTeams(m.id, ko.h, e.target.value || null)}>
                    <option value="">— Équipe B —</option>
                    ${allTeams.map(([c, t]) => html`<option key=${c} value=${c}>${t.flag} ${t.name}</option>`)}
                  </select>
                </div>
                <div style="display:flex;align-items:center;gap:6px;justify-content:center">
                  <${ScoreInput} value=${r.h} onChange=${v => setResult(m.id, v, r.a ?? null)} />
                  <span>–</span>
                  <${ScoreInput} value=${r.a} onChange=${v => setResult(m.id, r.h ?? null, v)} />
                </div>
              </div>
            `;
          })}
        </div>
      `;
    }

    function AdminSpecial({ tournament, setTournamentSpecial }) {
      const tsp = tournament.special || {};
      const allTeams = Object.entries(TEAMS).sort((a, b) => a[1].name.localeCompare(b[1].name));
      const Block = ({ icon, title, kind, type = 'team', placeholder }) => html`
        <div style="background:#fff;border:2px solid #000;border-radius:8px;padding:10px;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
            <span style="font-size:20px">${icon}</span>
            <div class="anton" style="font-size:14px">${title}</div>
          </div>
          ${type === 'team' ? html`
            <select class="input" style="margin:0" value=${tsp[kind] || ''} onChange=${e => setTournamentSpecial(kind, e.target.value || null)}>
              <option value="">— Pas encore défini —</option>
              ${allTeams.map(([c, t]) => html`<option key=${c} value=${c}>${t.flag} ${t.name}</option>`)}
            </select>
          ` : html`
            <input class="input" style="margin:0" type="text" value=${tsp[kind] || ''} onInput=${e => setTournamentSpecial(kind, e.target.value || null)} placeholder=${placeholder} />
          `}
        </div>
      `;
      return html`
        <div>
          ${Block({ icon: '🏆', title: 'CHAMPION DU MONDE', kind: 'winner' })}
          ${Block({ icon: '🥈', title: 'FINALISTE', kind: 'runnerUp' })}
          ${Block({ icon: '⚽', title: 'MEILLEUR BUTEUR', kind: 'topScorer', type: 'text', placeholder: 'ex: Mbappé' })}
          ${Block({ icon: '🎲', title: 'SURPRISE', kind: 'surprise' })}
        </div>
      `;
    }

    function AdminUsers({ activeLeague, users, toggleAdmin, removeMember, me }) {
      const members = (activeLeague.members || []).map(id => users[id]).filter(Boolean);
      const adminIds = activeLeague.admins || [];
      return html`
        <div>
          <div style="font-size:13px;margin-bottom:10px">${members.length} membre${members.length > 1 ? 's' : ''} dans <strong>${activeLeague.name}</strong>.</div>
          ${members.map(u => {
            const isA = adminIds.includes(u.id);
            return html`
              <div key=${u.id} style="display:flex;align-items:center;gap:8px;background:#fff;border:2px solid #000;border-radius:8px;padding:8px;margin-bottom:6px">
                <div style=${{ background: u.color, width: '24px', height: '24px', borderRadius: '50%', border: '2px solid #000' }}></div>
                <div style="flex:1;font-weight:700;font-size:13px">
                  ${u.name}${u.id === me.userId ? ' (toi)' : ''}
                  ${isA && html`<span style="margin-left:4px;font-size:11px;color:var(--pink)">👑</span>`}
                </div>
                <button onClick=${() => toggleAdmin(u.id)} style=${{ background: isA ? '#a3a3a3' : 'var(--yellow)', color: '#000', border: '2px solid #000', borderRadius: '6px', padding: '4px 8px', fontSize: '10px', fontFamily: 'Anton', cursor: 'pointer' }}>${isA ? 'RETIRER' : 'PROMOUV.'}</button>
                ${u.id !== me.userId && html`<button onClick=${() => removeMember(u.id)} style="background:var(--red);color:#fff;border:2px solid #000;border-radius:6px;padding:4px 6px;cursor:pointer">✕</button>`}
              </div>
            `;
          })}
        </div>
      `;
    }

    render(html`<${App} />`, document.getElementById('root'));
  </script>
</body>
</html>
